services:
  - type: web
    name: ai-job-agent
    runtime: python
    pythonVersion: "3.11.4"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.4"