services:
  - type: web
    name: ai-job-agent
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get update && apt-get install -y chromium-browser chromium-chromedriver
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DEBUG
        value: "False"